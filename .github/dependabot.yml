version: 2
updates:
  # GitHub Actions'ların (checkout, setup-node vb.) güncel/güvenli kalması için
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
